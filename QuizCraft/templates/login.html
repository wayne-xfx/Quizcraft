<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="login-wrapper">
        
        <section class="branding-section">
            <div class="logo-container">
                <img src="../assets/logo.svg" alt="QuizCraft Logo" class="brand-logo">
                <img src="../assets/quizcraft-text.svg" alt="QuizCraft" class="brand-text">
            </div>
        </section>

        <section class="form-section">
            <div class="login-card">
                
                <header class="card-header">
                    <h1>Welcome to Quizcraft</h1>
                    <p>Your journey begins with a single question.</p>
                </header>
                
                <!--/* the method should be set to POST when backend is integrated */-->
                <form action="index.html" method="GET" class="login-form"> 
                    
                    <div class="input-group">
                        <label for="email" class="sr-only">Email Address</label>
                        <img src="../assets/icons/email.svg" alt="" aria-hidden="true" class="input-icon">                        
                        <input type="email" id="email" name="email" placeholder="Email Address" required>
                    </div>

                    <div class="input-group">
                        <label for="password" class="sr-only">Password</label>
                        <img src="../assets/icons/lock.svg" alt="" aria-hidden="true" class="input-icon">
                        <input type="password" id="password" name="password" placeholder="Password" required>
                    </div>

                    <button type="submit" class="btn-primary">Log In</button>
                </form>

                <footer class="card-footer">
                    <p>New to QuizCraft? <a href="register.html">Create an Account</a></p>
                </footer>

            </div>
        </section>

    </main>

</body>
</html>
