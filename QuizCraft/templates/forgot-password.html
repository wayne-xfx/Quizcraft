<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../css/passreset.css">
</head>
<body>
    <div class="pageContainer">
        <div class="resetCard">
            
            <a href="login.html" class="backLink">
                <span class="backIcon"></span>
                Back to Login
            </a>

            <h1 class="title">Forgot Password?</h1>
            <p class="subtitle">Enter the email address associated with your account and we'll send you a reset link.</p>

            <form id="resetForm">
                <div class="inputGroup">
                    <span class="inputIcon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                            <path d="M22 6l-10 7L2 6"></path>
                        </svg>
                    </span>
                    <input type="email" id="emailInput" placeholder="Email Address" required>
                </div>
                
                <div id="statusMessage" class="statusMessage"></div>
                
                <button type="submit" id="submitBtn" class="primaryBtn">Send Reset Link</button>
            </form>

            <div class="footerLink">
                Remember your password? <a href="login.html" class="highlightLink">Log In</a>
            </div>
        </div>
    </div>

    <script src="../js/forgot-password.js"></script>
</body>
</html>
